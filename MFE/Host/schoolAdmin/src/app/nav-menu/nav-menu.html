<nav class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <div class="text-xl font-bold text-indigo-600">MyLogo</div>

      <!-- Desktop Menu -->
      <div class="hidden md:flex space-x-6">
        <a routerLink="/" class="text-gray-700 hover:text-indigo-600">Home</a>
        <a routerLink="/about" class="text-gray-700 hover:text-indigo-600">About</a>
        <a routerLink="/services" class="text-gray-700 hover:text-indigo-600">Services</a>
        <a routerLink="/contact" class="text-gray-700 hover:text-indigo-600">Contact</a>
      </div>

      <button

          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path

            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
    </div>

  <div
    *ngIf="isOpen"
    class="md:hidden bg-white px-4 pb-4 space-y-2 md:hidden bg-white px-4 pb-4 space-y-2 transition-all duration-300"
  >
    <a routerLink="/" routerLinkActive="text-indigo-600 font-semibold">Home </a>
    <a routerLink="/about" class="block text-gray-700 hover:text-indigo-600">About</a>
